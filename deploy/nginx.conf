server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;

    # Proxy the API surface to the FastAPI container (same Docker network).
    # Matches /health and any /jobs... path. Regex locations take priority
    # over the prefix "/" static handler below.
    location ~ ^/(health$|jobs) {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 30s;
    }

    # Serve the static dashboard for everything else.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
